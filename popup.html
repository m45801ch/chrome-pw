<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>瀏覽器密碼鎖定助手</title>
  <style>
    :root {
      --bg-gradient: linear-gradient(135deg, #f5f3fa 0%, #edeaf4 100%);
      --text-color: #3c354a;
      --border-color: rgba(142, 124, 195, 0.18);
      --primary-gradient: linear-gradient(135deg, #988bc7 0%, #7d6fa9 100%);
    }
    body {
      width: 220px;
      margin: 0;
      padding: 20px;
      background: var(--bg-gradient);
      color: var(--text-color);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 12px;
      justify-content: center;
    }
    .header img {
      width: 24px;
      height: 24px;
    }
    .header h3 {
      margin: 0;
      font-size: 14px;
      font-weight: 700;
      background: linear-gradient(to right, #4c3e6d, #8375a3);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .btn {
      width: 100%;
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 600;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.2s;
      outline: none;
    }
    .btn-primary {
      background: var(--primary-gradient);
      color: white;
      box-shadow: 0 4px 10px rgba(152, 139, 199, 0.2);
    }
    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 0 15px rgba(152, 139, 199, 0.3);
    }
    .btn-secondary {
      background: rgba(255, 255, 255, 0.6);
      border: 1px solid rgba(142, 124, 195, 0.25);
      color: var(--text-color);
    }
    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.85);
    }
  </style>
</head>
<body>
  <div class="header">
    <img src="icon.png" alt="Lock">
    <h3>鎖定安全助手</h3>
  </div>

  <button id="btn-lock-now" class="btn btn-primary">
    <span>🔒</span> 立即鎖定瀏覽器
  </button>
  
  <button id="btn-settings" class="btn btn-secondary">
    <span>⚙️</span> 偏好設定
  </button>

  <script src="popup.js"></script>
</body>
</html>
